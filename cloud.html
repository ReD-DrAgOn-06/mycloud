<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyCloud — Cloud Storage</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
</head>
<body class="cloud-page">

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="scanlines"></div>

  <!-- Top Nav -->
  <nav class="topnav">
    <div class="nav-logo">
      <svg viewBox="0 0 40 40" fill="none" width="32" height="32">
        <circle cx="20" cy="20" r="18" stroke="url(#cnlg)" stroke-width="1.5"/>
        <path d="M10 24 Q14 14 20 17 Q24 10 30 20 Q33 20 32 24 Z" fill="url(#cnlg2)" opacity="0.9"/>
        <defs>
          <linearGradient id="cnlg" x1="0" y1="0" x2="40" y2="40">
            <stop offset="0%" stop-color="#00f5ff"/>
            <stop offset="100%" stop-color="#7b2fff"/>
          </linearGradient>
          <linearGradient id="cnlg2" x1="10" y1="10" x2="32" y2="28">
            <stop offset="0%" stop-color="#00f5ff"/>
            <stop offset="100%" stop-color="#7b2fff"/>
          </linearGradient>
        </defs>
      </svg>
      <span>MY<b>CLOUD</b></span>
    </div>
    <div class="nav-breadcrumb">
      <a href="home.html">HOME</a> <span>›</span> <span class="active">CLOUD STORAGE</span>
    </div>
    <div class="nav-right">
      <span class="nav-user">⬡ I</span>
      <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
  </nav>

  <main class="cloud-main">

    <!-- Upload Panel -->
    <section class="panel upload-panel">
      <div class="panel-header">
        <h2>⬆ UPLOAD TO MEGA</h2>
        <div class="panel-line"></div>
      </div>

      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">
          <svg viewBox="0 0 64 64" fill="none" width="56" height="56">
            <path d="M32 44 V20 M22 30 L32 20 L42 30" stroke="url(#ulg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16 48 h32" stroke="url(#ulg)" stroke-width="2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="ulg" x1="0" y1="0" x2="64" y2="64">
                <stop offset="0%" stop-color="#00f5ff"/>
                <stop offset="100%" stop-color="#7b2fff"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <p class="upload-text">DRAG & DROP FILES HERE</p>
        <p class="upload-sub">or click to select files</p>
        <input type="file" id="fileInput" multiple accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip" onchange="handleFileSelect(event)"/>
        <button class="select-btn" onclick="document.getElementById('fileInput').click()">SELECT FILES</button>
      </div>

      <!-- Selected files preview -->
      <div class="selected-files" id="selectedFiles"></div>

      <!-- MEGA Link input -->
      <div class="mega-section">
        <div class="mega-header">
          <span class="mega-icon">☁</span>
          <h3>PASTE MEGA SHARE LINK</h3>
        </div>
        <p class="mega-note">Upload file to <a href="https://mega.nz" target="_blank">mega.nz</a>, copy the share link and paste below to save it here.</p>
        <div class="link-input-row">
          <input type="text" id="megaLink" placeholder="https://mega.nz/file/..." class="mega-input"/>
          <input type="text" id="fileName" placeholder="File name" class="mega-input small"/>
          <select id="fileType" class="mega-select">
            <option value="image">IMAGE</option>
            <option value="video">VIDEO</option>
            <option value="pdf">PDF</option>
            <option value="doc">DOC</option>
            <option value="other">OTHER</option>
          </select>
          <button class="add-btn" onclick="addMegaLink()">+ ADD</button>
        </div>
      </div>
    </section>

    <!-- Files Library -->
    <section class="panel files-panel">
      <div class="panel-header">
        <h2>⬇ MY FILES</h2>
        <div class="panel-line"></div>
        <div class="filter-tabs">
          <button class="ftab active" onclick="filterFiles('all', this)">ALL</button>
          <button class="ftab" onclick="filterFiles('image', this)">IMAGES</button>
          <button class="ftab" onclick="filterFiles('video', this)">VIDEOS</button>
          <button class="ftab" onclick="filterFiles('pdf', this)">PDFs</button>
          <button class="ftab" onclick="filterFiles('doc', this)">DOCS</button>
        </div>
      </div>

      <div class="files-grid" id="filesGrid">
        <!-- Files rendered by JS -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">◈</div>
          <p>NO FILES STORED YET</p>
          <p class="empty-sub">Add MEGA links above to see them here</p>
        </div>
      </div>
    </section>

  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
